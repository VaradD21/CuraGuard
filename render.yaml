services:
  - type: web
    name: curaguard-backend
    env: python
    rootDir: backend/server
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DB_HOST
        value: "db.jklhulrfeekjiirzbrck.supabase.co"
      - key: DB_PORT
        value: "6543"
      - key: DB_USER
        value: "postgres"
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: "postgres"
      - key: JWT_SECRET
        generateValue: true
      - key: CHILD_JWT_SECRET
        generateValue: true
      - key: GUARDIAN_FIELD_KEY
        sync: false

  - type: web
    name: curaguard-frontend
    env: static
    rootDir: frontend
    buildCommand: pnpm install && pnpm build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
